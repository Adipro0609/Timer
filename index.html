<!DOCTYPE html>
<html>
<head>
    <title>HTML Countdown</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: black;
            color: white;
            margin-top: 100px;
        }

        #count {
            font-size: 80px;
            animation: countdown 10s steps(10) forwards;
        }

        @keyframes countdown {
            0% { content: "10"; }
            10% { content: "9"; }
            20% { content: "8"; }
            30% { content: "7"; }
            40% { content: "6"; }
            50% { content: "5"; }
            60% { content: "4"; }
            70% { content: "3"; }
            80% { content: "2"; }
            90% { content: "1"; }
            100% { content: "0"; }
        }

        #count::after {
            content: "10";
            animation: countdown 10s steps(10) forwards;
        }
    </style>
</head>
<body>

<h1>Countdown</h1>
<div id="count"></div>

</body>
</html>
<!DOCTYPE html>
<html>
<head>
    <title>Countdown Animation</title>
    <style>
        body {
            background: black;
            color: white;
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
        }

        .countdown {
            font-size: 80px;
            font-weight: bold;
        }

        .countdown span {
            position: absolute;
            opacity: 0;
            animation: countdown 10s linear infinite;
        }

        .countdown span:nth-child(1) { animation-delay: 0s; }
        .countdown span:nth-child(2) { animation-delay: 1s; }
        .countdown span:nth-child(3) { animation-delay: 2s; }
        .countdown span:nth-child(4) { animation-delay: 3s; }
        .countdown span:nth-child(5) { animation-delay: 4s; }
        .countdown span:nth-child(6) { animation-delay: 5s; }
        .countdown span:nth-child(7) { animation-delay: 6s; }
        .countdown span:nth-child(8) { animation-delay: 7s; }
        .countdown span:nth-child(9) { animation-delay: 8s; }
        .countdown span:nth-child(10) { animation-delay: 9s; }

        @keyframes countdown {
            0% { opacity: 0; }
            5% { opacity: 1; }
            10% { opacity: 0; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>

<h1>Countdown Animation</h1>

<div class="countdown">
    <span>10</span>
    <span>9</span>
    <span>8</span>
    <span>7</span>
    <span>6</span>
    <span>5</span>
    <span>4</span>
    <span>3</span>
    <span>2</span>
    <span>1</span>
</div>

</body>
</html>
